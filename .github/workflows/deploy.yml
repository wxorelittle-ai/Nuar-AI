# МЭТР · CI/CD: тесты → выкатка на сервер.
#
# Срабатывает на push в main: сначала прогоняются тесты, и только если они
# зелёные — код катится на сервер. Выкатка сама проверяет здоровье приложения
# и откатывается, если оно не поднялось (см. deploy/remote_deploy.sh).
#
# Нужны секреты репозитория (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — IP или домен сервера (например 194.67.111.11)
#   DEPLOY_USER     — пользователь SSH (например root)
#   DEPLOY_SSH_KEY  — ПРИВАТНЫЙ ключ деплоя целиком, вместе со строками
#                     -----BEGIN OPENSSH PRIVATE KEY----- / -----END ...-----
# Пока секреты не заданы, шаг выкатки честно пропускается (сборка зелёная).
name: Тесты и деплой

on:
  push:
    branches: [main]
  workflow_dispatch:        # кнопка «Run workflow» для ручной выкатки

# Две выкатки одновременно ломают друг друга — держим очередь
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Тесты
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: pip install -r requirements.txt
      - name: pytest
        run: python -m pytest -q

  deploy:
    name: Выкатка на сервер
    needs: test              # без зелёных тестов на прод не выкатываемся
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Проверить, настроены ли секреты
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Проверяем КАЖДЫЙ секрет: без DEPLOY_USER ssh уйдёт в «@host» и упадёт
          missing=""
          [ -z "$DEPLOY_HOST" ]    && missing="$missing DEPLOY_HOST"
          [ -z "$DEPLOY_USER" ]    && missing="$missing DEPLOY_USER"
          [ -z "$DEPLOY_SSH_KEY" ] && missing="$missing DEPLOY_SSH_KEY"

          if [ -n "$missing" ] && [ -z "$DEPLOY_HOST$DEPLOY_USER$DEPLOY_SSH_KEY" ]; then
            echo "Секреты деплоя не заданы — выкатка пропущена."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$missing" ]; then
            echo "✗ Заданы не все секреты. Не хватает:$missing"
            echo "  Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ Все три секрета на месте"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      # Шаги нарочно атомарные: список шагов и их итоги видны в публичном API,
      # а логи требуют админ-прав. Так причина падения читается без логов.
      - name: 'Ключ: записать'
        if: steps.check.outputs.ready == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # tr -d '\r' — ключ, скопированный на Windows (`type key | clip`), приезжает
          # с CRLF, и OpenSSH отвергает его как «invalid format». Вычищаем.
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Строк в ключе: $(wc -l < ~/.ssh/deploy_key)"

      - name: 'Ключ: это приватный ключ?'
        if: steps.check.outputs.ready == 'true'
        run: |
          if ! head -1 ~/.ssh/deploy_key | grep -q 'BEGIN .*PRIVATE KEY'; then
            echo "✗ Первая строка НЕ «-----BEGIN OPENSSH PRIVATE KEY-----»."
            echo "  Скорее всего в секрет вставлен ПУБЛИЧНЫЙ ключ (.pub) или ключ обрезан."
            echo "  Первая строка (без секретов): $(head -c 40 ~/.ssh/deploy_key)…"
            exit 1
          fi
          echo "✓ Форма приватного ключа верная"

      - name: 'Ключ: читается OpenSSH?'
        if: steps.check.outputs.ready == 'true'
        run: |
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "✗ OpenSSH не может прочитать ключ: повреждён при вставке"
            echo "  (пропущены строки/пробелы) либо на ключе стоит парольная фраза."
            exit 1
          fi
          echo "✓ Ключ читается. Отпечаток:"
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: 'Сервер: получить host key (порт 22 доступен?)'
        if: steps.check.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh-keyscan -T 15 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "✗ Host key не получен: порт 22 на $DEPLOY_HOST недоступен с раннера GitHub."
            echo "  Вероятно, firewall провайдера пускает SSH не отовсюду."
            exit 1
          fi
          echo "✓ Host key получен — порт 22 доступен"

      - name: Проверить связь с сервером
        if: steps.check.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes \
                 -o ConnectTimeout=15 "${DEPLOY_USER}@${DEPLOY_HOST}" "echo CONNECT_OK"; then
            echo "✓ Вход по ключу работает"
          else
            echo "✗ Сервер не пускает по этому ключу."
            echo "  Проверьте: публичный ключ в ~/.ssh/authorized_keys на сервере,"
            echo "  DEPLOY_USER=$DEPLOY_USER, и что в секрет попал ПРИВАТНЫЙ ключ целиком."
            exit 1
          fi

      - name: Выкатка
        if: steps.check.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' < deploy/remote_deploy.sh
